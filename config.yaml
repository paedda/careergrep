user:
  name: Peter Kallai
  profile_summary: |
    Senior Software Engineer, 18+ years PHP/Symfony at scale,
    AWS, distributed systems, recent AI-native work with Claude.
    Looking for Senior or Staff Backend roles, remote-first, US-based.

keywords:
  must_have_any:
    - PHP
    - Symfony
  nice_to_have:
    - Senior
    - Staff
    - Backend
    - Claude
    - Anthropic
    - LLM
    - AI
    - AWS
    - Remote
    - OpenSearch
    - Elasticsearch
    - Microservices
    - Docker
  exclude:
    - Junior
    - Entry level
    - Intern
    - ".NET"

# Discovery: keyword-based search across aggregators (no company list needed)
discovery:
  enabled: true
  sources:
    - arbeitnow   # Remote jobs worldwide, no auth required, fresh data
    # - themuse   # Disabled: The Muse free API returns mostly stale (2021) data
  max_pages: 5    # Pages per source (~20 jobs/page for Muse, ~100 for Arbeitnow)

# Optional watch list: specific companies you always want to monitor
# These are fetched in addition to discovery results
companies:
  greenhouse:
    - anthropic
    - stripe
    - figma
  ashby:
    - linear
    - retool
    - arbiter-ai
  workable: []
  lever: []  # Lever v0 public API appears deprecated — slugs return 404

filters:
  max_age_hours: 24
  min_score: 3

delivery:
  email:
    enabled: true
    to: paedda@paedda.com
    from: paedda@paedda.com
    smtp_host: smtp.gmail.com
    smtp_port: 587

claude:
  enabled: false
  model: claude-sonnet-4-6
  daily_budget_usd: 2.0
