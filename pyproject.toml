[project]
name = "jobs-radar"
version = "0.1.0"
description = "Personal job search tool that surfaces fresh tech job postings, scores them with Claude, and delivers a daily digest."
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
jobs-radar = "jobs_radar.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jobs_radar"]
